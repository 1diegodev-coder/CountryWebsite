<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CountryDNA — Find Your Country</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0A0E14;
  --bg-surface:#13181F;
  --bg-elevated:#1C2330;
  --accent-green:#4ADE80;
  --accent-blue:#60A5FA;
  --accent-amber:#FBBF24;
  --accent-elim:#374151;
  --text-primary:#F9FAFB;
  --text-secondary:#9CA3AF;
  --text-muted:#4B5563;
  --font-display:'Fraunces',serif;
  --font-ui:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --radius:10px;
  --radius-sm:6px;
  --border:1px solid #1C2330;
}
html,body{height:100%;background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-ui);-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input{font-family:inherit}

/* ── ANIMATIONS ─────────────────────────────────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes countFlip{from{transform:translateY(-8px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── LANDING ────────────────────────────────────────────────── */
.landing{
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:100vh;
  align-items:center;
}
@media(max-width:768px){.landing{grid-template-columns:1fr;grid-template-rows:300px 1fr}}
.landing-content{
  padding:80px 60px 80px 80px;
  animation:slideUp 0.6s ease;
}
@media(max-width:768px){.landing-content{padding:40px 24px;order:2}}
.landing-headline{
  font-family:var(--font-display);
  font-size:clamp(40px,5vw,64px);
  font-weight:300;
  line-height:1.1;
  color:var(--text-primary);
  margin-bottom:20px;
  text-wrap:pretty;
}
.landing-sub{
  font-size:17px;
  color:var(--text-secondary);
  line-height:1.6;
  max-width:420px;
  margin-bottom:32px;
}
.landing-globe{
  height:100vh;
  background:radial-gradient(ellipse at center,#0D1117 0%,var(--bg-primary) 70%);
  position:relative;
  overflow:hidden;
}
@media(max-width:768px){.landing-globe{height:300px;order:1}}

/* ── BUTTONS ────────────────────────────────────────────────── */
.btn-hero{
  display:inline-flex;align-items:center;gap:8px;
  padding:16px 36px;
  background:var(--accent-green);
  color:#0A0E14;
  font-size:16px;font-weight:700;
  border-radius:var(--radius);
  transition:all 0.2s;
  letter-spacing:0.01em;
}
.btn-hero:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(74,222,128,0.35)}
.btn-primary{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 22px;
  background:var(--accent-green);
  color:#0A0E14;
  font-size:14px;font-weight:700;
  border-radius:var(--radius-sm);
  transition:all 0.2s;
}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px)}
.btn-primary.disabled,.btn-primary:disabled{opacity:0.35;pointer-events:none}
.btn-primary.btn-sm{padding:7px 14px;font-size:12px}
.btn-ghost{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 18px;
  color:var(--text-secondary);
  font-size:14px;font-weight:500;
  border-radius:var(--radius-sm);
  border:var(--border);
  transition:all 0.2s;
}
.btn-ghost:hover{color:var(--text-primary);border-color:#374151;background:var(--bg-elevated)}
.btn-ghost.btn-sm{padding:6px 12px;font-size:12px}
.btn-ghost.active{color:var(--accent-green);border-color:var(--accent-green)}
.btn-ghost:disabled{opacity:0.3;pointer-events:none}
.btn-override{
  padding:3px 8px;font-size:11px;color:var(--accent-amber);
  border:1px solid var(--accent-amber);border-radius:4px;
  opacity:0.7;transition:opacity 0.2s;white-space:nowrap;flex-shrink:0;
}
.btn-override:hover{opacity:1}
.btn-card-primary{
  flex:1;padding:8px 0;background:var(--bg-elevated);color:var(--text-primary);
  font-size:13px;font-weight:600;border-radius:var(--radius-sm);border:var(--border);
  transition:all 0.15s;
}
.btn-card-primary:hover{background:#252f3f;border-color:#374151}
.btn-card-ghost{
  padding:8px 14px;color:var(--text-muted);font-size:12px;
  border-radius:var(--radius-sm);border:var(--border);
  transition:all 0.15s;
}
.btn-card-ghost:hover{color:var(--text-secondary)}

/* ── QUIZ LAYOUT ────────────────────────────────────────────── */
.quiz-layout{
  display:grid;
  grid-template-columns:60% 40%;
  min-height:100vh;
  max-height:100vh;
  overflow:hidden;
}
@media(max-width:768px){
  .quiz-layout{grid-template-columns:1fr;grid-template-rows:220px 1fr;max-height:none;overflow:auto}
}
.quiz-left{
  padding:48px 56px 32px;
  display:flex;flex-direction:column;
  overflow-y:auto;
  border-right:var(--border);
}
@media(max-width:768px){.quiz-left{padding:24px;order:2;overflow:visible}}
.quiz-right{
  background:radial-gradient(ellipse at 50% 30%,#0D1117 0%,var(--bg-primary) 80%);
  display:flex;flex-direction:column;
  position:relative;
  overflow:hidden;
}
@media(max-width:768px){.quiz-right{height:220px;order:1}}

/* ── QUIZ PROGRESS ──────────────────────────────────────────── */
.quiz-progress-area{margin-bottom:32px}
.quiz-step-label{margin-bottom:10px}
.progress-bar-outer{
  height:3px;background:var(--bg-elevated);border-radius:2px;overflow:hidden;
}
.progress-bar-inner{
  height:100%;background:var(--accent-green);border-radius:2px;
  transition:width 0.5s cubic-bezier(0.4,0,0.2,1);
}

/* ── QUESTION ───────────────────────────────────────────────── */
.question-body{margin-bottom:28px}
.question-text{
  font-family:var(--font-display);
  font-size:clamp(22px,3vw,32px);
  font-weight:300;
  line-height:1.3;
  color:var(--text-primary);
  margin-bottom:10px;
  text-wrap:pretty;
}
.question-sub{font-size:14px;color:var(--text-secondary);line-height:1.5}

/* ── OPTIONS ────────────────────────────────────────────────── */
.options-list{
  display:flex;flex-direction:column;gap:8px;
  flex:1;
  overflow-y:auto;
  padding-right:4px;
}
.options-list::-webkit-scrollbar{width:3px}
.options-list::-webkit-scrollbar-thumb{background:var(--bg-elevated)}
.option-card{
  width:100%;text-align:left;
  padding:12px 16px;
  background:var(--bg-surface);
  border:1px solid #1C2330;
  border-radius:var(--radius-sm);
  transition:all 0.15s;
}
.option-card:hover{background:var(--bg-elevated);border-color:#374151}
.option-card.selected{
  background:rgba(74,222,128,0.07);
  border-color:var(--accent-green);
}
.option-card-inner{display:flex;align-items:center;gap:12px}
.radio,.checkbox{
  width:18px;height:18px;border-radius:50%;
  border:2px solid var(--text-muted);
  flex-shrink:0;transition:all 0.15s;
  display:flex;align-items:center;justify-content:center;
}
.checkbox{border-radius:4px}
.radio.checked,.checkbox.checked{
  background:var(--accent-green);border-color:var(--accent-green);
  color:#0A0E14;font-size:11px;font-weight:700;
}
.radio.checked::after{content:'';width:6px;height:6px;background:#0A0E14;border-radius:50%}
.option-text{flex:1;min-width:0}
.option-label{font-size:14px;color:var(--text-primary);font-weight:500;line-height:1.3}
.option-sub{font-size:12px;color:var(--text-secondary);margin-top:2px}

/* ── QUIZ NAV ───────────────────────────────────────────────── */
.quiz-nav{
  display:flex;justify-content:space-between;align-items:center;
  padding-top:20px;margin-top:8px;
  border-top:var(--border);
}

/* ── LIVE COUNTER ───────────────────────────────────────────── */
.live-counter{
  display:flex;align-items:center;gap:12px;
  padding:16px 20px;
  background:rgba(19,24,31,0.8);
  border-bottom:var(--border);
  backdrop-filter:blur(8px);
}
.counter-number{
  font-size:28px;font-weight:700;
  font-family:var(--font-mono);
  color:var(--accent-green);
  animation:countFlip 0.3s ease;
}
.globe-container{flex:1;min-height:0;position:relative}

/* ── TOAST ──────────────────────────────────────────────────── */
.toast-area{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:100}
.toast{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  background:var(--bg-surface);
  border:var(--border);
  border-left:3px solid var(--accent-green);
  border-radius:var(--radius-sm);
  font-size:13px;
  animation:slideUp 0.3s ease;
  backdrop-filter:blur(8px);
  max-width:280px;
}

/* ── INTERIM REVEAL ─────────────────────────────────────────── */
.interim-overlay{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:40px 24px;
  background:radial-gradient(ellipse at 50% 30%,#0D1117 0%,var(--bg-primary) 70%);
  animation:fadeIn 0.5s ease;
}
.interim-card{
  max-width:560px;width:100%;
  text-align:center;
  padding:56px 48px;
  background:var(--bg-surface);
  border:var(--border);
  border-radius:16px;
}
@media(max-width:600px){.interim-card{padding:32px 24px}}
.interim-count{display:flex;align-items:center;justify-content:center;gap:8px;margin:16px 0}
.interim-country-chip{
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;
  background:var(--bg-elevated);
  border:var(--border);
  border-radius:var(--radius-sm);
}

/* ── RESULTS LAYOUT ─────────────────────────────────────────── */
.results-layout{
  min-height:100vh;
  display:flex;flex-direction:column;
}
.results-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 28px;
  background:rgba(10,14,20,0.9);
  border-bottom:var(--border);
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(12px);
}
.mirror-banner{
  padding:16px 28px;
  background:linear-gradient(90deg,rgba(74,222,128,0.06) 0%,transparent 100%);
  border-bottom:var(--border);
}
.mirror-text{
  font-family:var(--font-display);
  font-size:15px;font-style:italic;
  color:var(--text-secondary);
  max-width:720px;
}
.results-body{
  display:grid;
  grid-template-columns:280px 1fr 300px;
  flex:1;
  min-height:0;
  overflow:hidden;
}
@media(max-width:1100px){.results-body{grid-template-columns:240px 1fr 260px}}
@media(max-width:768px){
  .results-body{
    grid-template-columns:1fr;
    grid-template-rows:300px auto auto;
    overflow:auto;
  }
}

/* ── GLOBE PANEL (RESULTS) ──────────────────────────────────── */
.results-globe-panel{
  border-right:var(--border);
  display:flex;flex-direction:column;
  background:radial-gradient(ellipse at 50% 40%,#0D1117 0%,var(--bg-primary) 80%);
  position:relative;overflow:hidden;
}
.globe-wrap{flex:1;min-height:0;position:relative}
.globe-stats{
  display:flex;justify-content:space-around;
  padding:16px;
  border-top:var(--border);
}
.globe-stat{text-align:center}

/* ── MATCH CARDS ────────────────────────────────────────────── */
.match-cards-panel{
  overflow-y:auto;
  padding:24px;
  background:var(--bg-primary);
}
.match-cards-panel::-webkit-scrollbar{width:4px}
.match-cards-panel::-webkit-scrollbar-thumb{background:var(--bg-elevated)}
.match-cards-grid{display:flex;flex-direction:column;gap:12px}
.match-card{
  background:var(--bg-surface);
  border:var(--border);
  border-radius:var(--radius);
  padding:18px;
  transition:all 0.2s;
}
.match-card:hover{border-color:#374151;transform:translateY(-2px)}
.match-card.top-match{border-color:rgba(74,222,128,0.35)}
.match-card.override{border-color:rgba(251,191,36,0.3)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.match-bar-outer{height:3px;background:var(--bg-elevated);border-radius:2px;overflow:hidden;margin-bottom:14px}
.match-bar-inner{height:100%;border-radius:2px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1)}
.card-section{margin-bottom:12px}
.card-section-title{font-size:10px;font-family:var(--font-mono);letter-spacing:0.1em;margin-bottom:6px}
.card-section-title.green{color:rgba(74,222,128,0.7)}
.card-section-title.amber{color:rgba(251,191,36,0.6)}
.bullet{display:flex;align-items:flex-start;gap:8px;font-size:12px;line-height:1.5;margin-bottom:4px}
.bullet.green{color:#9CA3AF}
.bullet.green::before{content:'✓';color:var(--accent-green);flex-shrink:0;font-weight:700}
.bullet.amber{color:#9CA3AF}
.bullet.amber::before{content:'⚠';flex-shrink:0;font-size:11px}
.card-cost{
  padding:8px 10px;background:var(--bg-elevated);border-radius:var(--radius-sm);
  font-size:12px;display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:12px;
}
.card-dims{margin-bottom:12px}
.dim-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.dim-label{font-size:11px;color:var(--text-muted);min-width:88px;flex-shrink:0}
.dim-bar-outer{flex:1;height:4px;background:var(--bg-elevated);border-radius:2px;overflow:hidden}
.dim-bar-inner{height:100%;background:var(--accent-blue);border-radius:2px;transition:width 0.6s ease}
.dim-score{font-size:11px;font-family:var(--font-mono);color:var(--text-secondary);min-width:28px;text-align:right}
.card-actions{display:flex;gap:8px;margin-top:4px}

/* ── SIDE PANEL ─────────────────────────────────────────────── */
.side-panel{
  border-left:var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.side-tabs{
  display:flex;border-bottom:var(--border);flex-shrink:0;
}
.side-tab{
  flex:1;padding:12px 4px;font-size:11px;font-weight:600;
  letter-spacing:0.04em;color:var(--text-muted);
  border-right:var(--border);transition:all 0.15s;
}
.side-tab:last-child{border-right:none}
.side-tab:hover{color:var(--text-secondary);background:var(--bg-elevated)}
.side-tab.active{color:var(--accent-green);background:rgba(74,222,128,0.05)}

/* ── ELIMINATION LOG ────────────────────────────────────────── */
.elim-log{overflow-y:auto;flex:1;padding:8px 0}
.elim-log::-webkit-scrollbar{width:3px}
.elim-log::-webkit-scrollbar-thumb{background:var(--bg-elevated)}
.elim-group{border-bottom:var(--border)}
.elim-group-header{
  width:100%;text-align:left;padding:10px 16px;
  display:flex;align-items:center;gap:4px;
  transition:background 0.15s;
}
.elim-group-header:hover{background:var(--bg-elevated)}
.elim-countries{padding:0 0 4px}
.elim-country{
  display:flex;align-items:center;gap:8px;
  padding:7px 16px;
  transition:background 0.15s;
}
.elim-country:hover{background:var(--bg-elevated)}

/* ── WHAT-IF PANEL ──────────────────────────────────────────── */
.whatif-panel{padding:20px 16px;overflow-y:auto;flex:1}
.whatif-range{
  -webkit-appearance:none;appearance:none;
  width:100%;height:4px;
  background:var(--bg-elevated);border-radius:2px;outline:none;cursor:pointer;
}
.whatif-range::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:16px;height:16px;border-radius:50%;
  background:var(--accent-green);cursor:pointer;
  box-shadow:0 0 8px rgba(74,222,128,0.4);
}
.whatif-range::-moz-range-thumb{
  width:16px;height:16px;border-radius:50%;border:none;
  background:var(--accent-green);cursor:pointer;
}
.whatif-delta{
  padding:10px 12px;
  background:rgba(74,222,128,0.08);
  border:1px solid rgba(74,222,128,0.2);
  border-radius:var(--radius-sm);
  font-size:12px;color:var(--accent-green);
  text-align:center;
}

/* ── SHARE PANEL ────────────────────────────────────────────── */
.share-panel{padding:20px 16px;overflow-y:auto;flex:1}
.share-card-preview{
  background:var(--bg-elevated);border:var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:16px;
}
.share-url-row{display:flex;gap:8px;align-items:center}
.share-url{
  flex:1;min-width:0;padding:8px 10px;
  background:var(--bg-elevated);border:var(--border);
  border-radius:var(--radius-sm);
  font-size:12px;font-family:var(--font-mono);color:var(--text-secondary);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* ── LEGAL DISCLAIMER ───────────────────────────────────────── */
.legal-disclaimer{
  padding:12px 24px;
  background:rgba(19,24,31,0.8);
  border-top:var(--border);
  font-size:11px;color:var(--text-muted);
  line-height:1.5;
}

/* ── DEEP DIVE ──────────────────────────────────────────────── */
.deep-dive{
  min-height:100vh;
  background:var(--bg-primary);
  animation:fadeIn 0.4s ease;
}
.deep-header{
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:12px;
  padding:16px 28px;
  background:rgba(10,14,20,0.9);
  border-bottom:var(--border);
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(12px);
}
.deep-body{max-width:1200px;margin:0 auto;padding:40px 28px}
.deep-hero{
  display:flex;align-items:flex-start;gap:28px;
  margin-bottom:40px;
}
.deep-title{
  font-family:var(--font-display);
  font-size:48px;font-weight:300;
  color:var(--text-primary);
  line-height:1;
}
.deep-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}
@media(max-width:768px){.deep-grid{grid-template-columns:1fr}}
.deep-card{
  background:var(--bg-surface);border:var(--border);
  border-radius:var(--radius);padding:24px;
}
.deep-card-title{
  font-size:11px;font-family:var(--font-mono);letter-spacing:0.1em;
  color:var(--text-muted);margin-bottom:16px;
}
.deep-dim-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.visa-card{
  background:var(--bg-elevated);border:var(--border);
  border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;
}
.visa-tag{
  display:inline-flex;align-items:center;
  padding:2px 8px;
  background:var(--bg-primary);
  border:var(--border);
  border-radius:4px;
  font-size:11px;color:var(--text-secondary);
  font-family:var(--font-mono);
}
.visa-tag.green{color:var(--accent-green);border-color:rgba(74,222,128,0.3)}

/* ── SCROLLBAR ──────────────────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg-primary)}
::-webkit-scrollbar-thumb{background:#1C2330;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#374151}

/* ── MOBILE HELPERS ─────────────────────────────────────────── */
@media(max-width:768px){
  .results-header{padding:10px 16px}
  .mirror-banner{padding:12px 16px}
  .side-panel{max-height:400px}
}
</style>
</head>
<body>
<div id="app"></div>

<!-- CDN Dependencies -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

<!-- Globe.gl (loads Three.js internally) -->
<script>
(function(){
  var s = document.createElement('script');
  s.src = 'https://unpkg.com/globe.gl@2.27.2/dist/globe.gl.min.js';
  s.onerror = function(){ console.warn('Globe.gl failed to load — canvas fallback active'); };
  document.head.appendChild(s);
})();
</script>

<!-- Tweaks defaults -->
<script>
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
